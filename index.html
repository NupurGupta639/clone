<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT COMPUTER EDUCATION | Online Examination</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --error: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin-bottom: 1.5rem; text-align: center; color: var(--text-light); }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        .btn:disabled { background: #475569; cursor: not-allowed; transform: none; }

        .btn-outline { background: transparent; border: 1px solid var(--primary); margin-right: 10px; }

        #test-section, #result-section { display: none; }
        
        .question-box h3 { margin-bottom: 1.5rem; line-height: 1.4; }
        
        .option {
            background: #334155;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }
        .option:hover { background: #475569; }
        .option input { margin-right: 12px; transform: scale(1.2); cursor: pointer; }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        /* --- Result Styling --- */
        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--success);
            margin: 1rem 0;
        }
        .result-details {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .hindi-text { margin-top: 15px; color: #94a3b8; font-style: italic; }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }

        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            .btn { width: 100%; margin-bottom: 10px; }
            .nav-controls { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <h1>IT COMPUTER EDUCATION</h1>
    <p>Professional Excellence in IT Skills</p>
</header>

<div class="container">
    <div id="login-section" class="card">
        <h2>Student Login</h2>
        <div class="input-group">
            <label>Student Name</label>
            <input type="text" id="stdName" placeholder="Enter Full Name" required>
        </div>
        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter Mobile Number" required>
        </div>
        <div class="input-group">
            <label>Institute Password</label>
            <input type="password" id="password" placeholder="Enter Test Password" required>
            <div id="login-error" class="error-msg">❌ Incorrect Password. USE:- ITCE@123</div>
        </div>
        <button class="btn" style="width: 100%;" onclick="startTest()">Start Examination</button>
    </div>

    <div id="test-section" class="card">
        <div style="display: flex; justify-content: space-between; color: var(--secondary); margin-bottom: 10px; font-weight: bold;">
            <span>Topic: Microsoft Excel</span>
            <span id="q-counter">Question 1/40</span>
        </div>
        <hr style="opacity: 0.1; margin-bottom: 20px;">
        <div id="question-container" class="question-box"></div>
        <div class="nav-controls">
            <button id="prev-btn" class="btn btn-outline" onclick="changeQuestion(-1)">Previous</button>
            <button id="next-btn" class="btn" onclick="changeQuestion(1)">Next Question</button>
            <button id="submit-btn" class="btn" style="background: var(--success); display: none;" onclick="submitTest()">Submit Test</button>
        </div>
    </div>

    <div id="result-section" class="card" style="text-align: center; border: 2px solid var(--success);">
        <h2 style="color: var(--success);">Test Completed!</h2>
        <p>Student: <span id="res-name" style="color: var(--secondary);"></span></p>
        <div class="result-score" id="res-score">0/40</div>
        <div class="result-details">
            <p>Percentage: <span id="res-percent">0%</span></p>
            <p>Grade: <span id="res-grade">F</span></p>
        </div>
        <p class="hindi-text"></p>
        <button class="btn" style="margin-top: 20px;" onclick="location.reload()">Exit Test</button>
    </div>
</div>

<footer>
    &copy; 2026 IT COMPUTER EDUCATION. All Rights Reserved.
</footer>

<script>
    const questions = [
  {
    q: "What is the SUM function used for?",
    options: ["To calculate average", "To add numbers", "To join text", "To filter data"],
    correct: 1
  },
  {
    q: "What does =AVERAGE(A1:A5) do?",
    options: ["Calculates total", "Counts values", "Calculates mean", "Returns maximum value"],
    correct: 2
  },
  {
    q: "Which function counts only numeric cells?",
    options: ["COUNTA", "COUNT", "COUNTIF", "SUM"],
    correct: 1
  },
  {
    q: "Which function is used to display the largest number?",
    options: ["MIN", "MAX", "AVERAGE", "IF"],
    correct: 1
  },
  {
    q: "Which function is used to find the smallest number?",
    options: ["MAX", "MIN", "SUM", "COUNT"],
    correct: 1
  },
  {
    q: "What is the general format of the IF function?",
    options: ["=IF(value, result)", "=IF(logical_test, value_if_true, value_if_false)", "=IF(range)", "=IF(test)"],
    correct: 1
  },
  {
    q: "If Salary > 40000 show 'High' otherwise 'Low' — which function is used?",
    options: ["AND", "OR", "IF", "SUMIF"],
    correct: 2
  },
  {
    q: "When does the AND function return TRUE?",
    options: ["When any one condition is true", "When all conditions are true", "When all are false", "When there is an error"],
    correct: 1
  },
  {
    q: "When does the OR function return TRUE?",
    options: ["When all conditions are true", "When at least one condition is true", "When all are false", "Never"],
    correct: 1
  },
  {
    q: "Which function is used to return an alternative value when an error occurs?",
    options: ["IF", "SWITCH", "IFERROR", "OR"],
    correct: 2
  },
  {
    q: "CONCAT is used for:",
    options: ["Dividing text", "Joining text", "Adding numbers", "Getting date"],
    correct: 1
  },
  {
    q: "What does LEFT(text,4) do?",
    options: ["Returns last 4 characters", "Returns first 4 characters", "Returns middle 4 characters", "Returns total length"],
    correct: 1
  },
  {
    q: "What does RIGHT(text,3) return?",
    options: ["First 3 letters", "Middle 3 letters", "Last 3 letters", "Total 3 words"],
    correct: 2
  },
  {
    q: "Which function extracts characters from the middle of text?",
    options: ["LEFT", "RIGHT", "MID", "LEN"],
    correct: 2
  },
  {
    q: "What does the LEN function do?",
    options: ["Converts text to capital", "Counts characters", "Removes spaces", "Joins text"],
    correct: 1
  },
  {
    q: "Which function removes extra spaces?",
    options: ["CLEAN", "TRIM", "LEFT", "LOWER"],
    correct: 1
  },
  {
    q: "What does the PROPER function do?",
    options: ["Converts all to capital", "Converts all to lowercase", "Capitalizes the first letter of each word", "Deletes text"],
    correct: 2
  },
  {
    q: "Which function shows today’s date?",
    options: ["NOW()", "DATE()", "TODAY()", "TIME()"],
    correct: 2
  },
  {
    q: "Which function shows current date and time?",
    options: ["TODAY", "NOW", "DATE", "CLOCK"],
    correct: 1
  },
  {
    q: "VLOOKUP is used for:",
    options: ["Horizontal search", "Vertical search", "Filtering", "Sorting"],
    correct: 1
  },
  {
    q: "HLOOKUP is used for:",
    options: ["Vertical search", "Horizontal search", "Counting", "Adding"],
    correct: 1
  },
  {
    q: "In VLOOKUP, what does FALSE mean?",
    options: ["Approximate match", "Exact match", "Blank result", "Error"],
    correct: 1
  },
  {
    q: "SUMIF is used for:",
    options: ["Multiple condition sum", "Single condition sum", "Joining text", "Average"],
    correct: 1
  },
  {
    q: "SUMIFS is used for:",
    options: ["One condition", "Multiple conditions", "Error handling", "Showing date"],
    correct: 1
  },
  {
    q: "What does COUNTIF do?",
    options: ["Counts based on a condition", "Adds total", "Sorts data", "Filters data"],
    correct: 0
  },
  {
    q: "When is COUNTIFS used?",
    options: ["One condition", "Two or more conditions", "Date count", "Text join"],
    correct: 1
  },
  {
    q: "PMT function is used for:",
    options: ["Tax calculation", "EMI calculation", "Salary addition", "Discount"],
    correct: 1
  },
  {
    q: "In PMT(rate, nper, pv), what does nper mean?",
    options: ["Interest rate", "Loan amount", "Total number of installments", "Bonus"],
    correct: 2
  },
  {
    q: "What is the main use of a Pivot Table?",
    options: ["Typing", "Summarizing data", "Deleting data", "Formatting"],
    correct: 1
  },
  {
    q: "What does the FILTER function do?",
    options: ["Adds data", "Deletes data", "Shows data based on criteria", "Calculates average"],
    correct: 2
  },
  {
    q: "What does the SORT function do?",
    options: ["Removes data", "Arranges data", "Multiplies data", "Joins data"],
    correct: 1
  },
  {
    q: "Which feature is used to create a product dropdown?",
    options: ["Pivot", "Data Validation", "Filter", "Sort"],
    correct: 1
  },
  {
    q: "Which function is used to auto fetch rate?",
    options: ["SUM", "VLOOKUP", "IF", "COUNT"],
    correct: 1
  },
  {
    q: "What is the correct GST calculation formula?",
    options: ["Rate + Quantity", "Rate × Quantity × GST%", "Rate ÷ Quantity", "GST% × Quantity"],
    correct: 1
  },
  {
    q: "If Quantity > Stock, what should be displayed?",
    options: ["OK", "Available", "Out of Stock", "Error"],
    correct: 2
  },
  {
    q: "When is nested IF used in discount logic?",
    options: ["When there is one condition", "When there are multiple conditions", "No condition", "To join text"],
    correct: 1
  },
  {
    q: "What is the default file extension of Microsoft Excel (new version)?",
    options: [".xls", ".xlsx", ".docx", ".csv"],
    correct: 1
  },
  {
    q: "By default, approximately how many characters are visible in an Excel column?",
    options: ["4", "6", "8", "12"],
    correct: 2
  },
  {
    q: "What is the total number of rows in modern Microsoft Excel (2007 and later)?",
    options: ["65,536", "5,00,000", "10,00,000", "10,48,576"],
    correct: 3
  },
  {
    q: "What is the total number of columns in modern Microsoft Excel (2007 and later)?",
    options: ["256", "512", "16,384", "10,000"],
    correct: 2
  }
];




    let currentQ = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let testActive = false;

    window.onbeforeunload = function() { if(testActive) return "Data will be lost!"; };

    function startTest() {
        const pass = document.getElementById('password').value;
        const name = document.getElementById('stdName').value;
        if(!name) { alert("Enter Name"); return; }
        if(pass === "ITCE@123") {
            testActive = true;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('test-section').style.display = 'block';
            renderQuestion();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function renderQuestion() {
        const container = document.getElementById('question-container');
        const qData = questions[currentQ];
        document.getElementById('q-counter').innerText = `Question ${currentQ + 1}/${questions.length}`;

        let html = `<h3>${currentQ + 1}. ${qData.q}</h3>`;
        qData.options.forEach((opt, idx) => {
            const checked = userAnswers[currentQ] === idx ? 'checked' : '';
            html += `<label class="option"><input type="radio" name="mcq" onclick="saveAnswer(${idx})" ${checked}> ${opt}</label>`;
        });
        container.innerHTML = html;

        document.getElementById('prev-btn').disabled = (currentQ === 0);
        document.getElementById('next-btn').style.display = (currentQ === questions.length - 1) ? 'none' : 'inline-block';
        document.getElementById('submit-btn').style.display = (currentQ === questions.length - 1) ? 'inline-block' : 'none';
    }

    function saveAnswer(idx) { userAnswers[currentQ] = idx; }
    function changeQuestion(step) { currentQ += step; renderQuestion(); }

    function submitTest() {
        if(confirm("Confirm Final Submission?")) {
            testActive = false;
            let score = 0;
            userAnswers.forEach((ans, idx) => {
                if(ans === questions[idx].correct) score++;
            });

            const percent = (score / questions.length) * 100;
            let grade = "F";
            if(percent >= 90) grade = "A+";
            else if(percent >= 75) grade = "A";
            else if(percent >= 60) grade = "B";
            else if(percent >= 45) grade = "C";

            document.getElementById('test-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('res-name').innerText = document.getElementById('stdName').value;
            document.getElementById('res-score').innerText = `${score} / ${questions.length}`;
            document.getElementById('res-percent').innerText = `${percent.toFixed(1)}%`;
            document.getElementById('res-grade').innerText = grade;
        }
    }
</script>
</body>
</html>
